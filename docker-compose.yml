version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app

  frontend:
    build: ./frontend/smart-auditor-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
